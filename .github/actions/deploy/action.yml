name: 'Deploy Python Greetings Service'
description: 'Deploys python-greetings to a given environment using pm2'

inputs:
  environment:
    description: 'Environment name: dev, stg, preprod, prod'
    required: true
  port:
    description: 'Port number for the service'
    required: true

runs:
  using: "composite"
  steps:
    - name: Checkout pipeline repo
      uses: actions/checkout@v6

    - name: Checkout python-greetings repo
      uses: actions/checkout@v6
      with:
        repository: mtararujs/python-greetings
        path: python-greetings

    - name: Stop existing service if running
      shell: cmd
      run: pm2 delete greetings-app-${{ inputs.environment }} & EXIT /B 0

    - name: Copy app to stable deployment folder
      shell: cmd
      run: |
        if not exist "C:\deployments\greetings-app-${{ inputs.environment }}" mkdir "C:\deployments\greetings-app-${{ inputs.environment }}"
        xcopy /E /Y /I "%GITHUB_WORKSPACE%\python-greetings" "C:\deployments\greetings-app-${{ inputs.environment }}"

    - name: Install dependencies in deployment folder
      shell: cmd
      working-directory: C:\deployments\greetings-app-${{ inputs.environment }}
      run: pip install -r requirements.txt

    - name: Start service with pm2
      shell: cmd
      working-directory: C:\deployments\greetings-app-${{ inputs.environment }}
      run: pm2 start app.py --name greetings-app-${{ inputs.environment }} --interpreter python -- --port ${{ inputs.port }}

    - name: Wait for service to be ready
      shell: cmd
      run: ping 127.0.0.1 -n 4 > nul

    - name: Verify service is running
      shell: cmd
      run: pm2 list