name: 'Deploy Python Greetings Service'
description: 'Deploys python-greetings to a given environment using pm2'

inputs:
  environment:
    description: 'Environment name: dev, stg, preprod, prod'
    required: true
  port:
    description: 'Port number for the service'
    required: true

runs:
  using: "composite"
  steps:
    - name: Checkout pipeline repo
      uses: actions/checkout@v4

    - name: Checkout python-greetings repo
      uses: actions/checkout@v4
      with:
        repository: mtararujs/python-greetings
        path: python-greetings

    - name: Create virtual environment
      shell: cmd
      working-directory: python-greetings
      run: python -m venv venv

    - name: Install dependencies
      shell: cmd
      working-directory: python-greetings
      run: venv\Scripts\python.exe -m pip install -r requirements.txt

    - name: Stop existing service if running
      shell: cmd
      working-directory: python-greetings
      run: pm2 delete greetings-app-${{ inputs.environment }} & EXIT /B 0

    - name: Start service with pm2
      shell: cmd
      working-directory: python-greetings
      run: pm2 start app.py --name greetings-app-${{ inputs.environment }} --interpreter venv\Scripts\python.exe -- --port ${{ inputs.port }}

    - name: Wait for app startup
      shell: cmd
      run: timeout /t 5 /nobreak

    - name: Show pm2 processes
      shell: cmd
      run: pm2 list