name: 'Run Greetings API Tests'
description: 'Runs API tests for a given environment'

inputs:
  environment:
    description: 'Environment name: dev, stg, preprod, prod'
    required: true

runs:
  using: "composite"
  steps:
    - name: Checkout pipeline repo
      uses: actions/checkout@v6

    - name: Checkout test framework repo
      uses: actions/checkout@v6
      with:
        repository: mtararujs/course-js-api-framework
        path: course-js-api-framework

    - name: Install npm dependencies
      shell: cmd
      working-directory: course-js-api-framework
      run: npm install

    - name: Run tests
      shell: cmd
      working-directory: course-js-api-framework
      run: npm run greetings greetings_${{ inputs.environment }}